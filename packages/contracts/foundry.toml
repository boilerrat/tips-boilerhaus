[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "scripts"

# Solidity version
solc_version = "0.8.24"

# Optimizer — enabled for production; tune runs based on deployment vs call frequency
optimizer = true
optimizer_runs = 200

# EVM version — paris for reproducible builds on Base
evm_version = "paris"

# Remappings
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

# Fuzz testing config
[fuzz]
runs = 1000

[rpc_endpoints]
base = "${NEXT_PUBLIC_BASE_RPC_URL}"
base_sepolia = "${NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=8453" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532" }
