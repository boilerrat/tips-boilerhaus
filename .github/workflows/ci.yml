# ============================================================
# CI/CD Pipeline — tips-boilerhaus
#
# Jobs:
#   validate  — lint, typecheck, test (all branches)
#   build     — Docker image (main only)
#   deploy    — Push image and trigger rollout on VPS (main only)
#
# Secrets required (set in GitHub repo Settings → Secrets):
#   NEXT_PUBLIC_PRIVY_APP_ID
#   NEXT_PUBLIC_REGISTRY_CONTRACT_ADDRESS
#   NEXT_PUBLIC_BASE_RPC_URL
#   NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL
#   NEXT_PUBLIC_PINATA_GATEWAY_URL
#   PINATA_JWT               — runtime secret, set in Dokploy env (not a build arg)
#   COINBASE_ONRAMP_API_KEY  — runtime secret, set in Dokploy env (not a build arg)
#   COINBASE_ONRAMP_API_SECRET — runtime secret, set in Dokploy env (not a build arg)
#   VPS_HOST         — SSH host for boilerhaus.org VPS
#   VPS_USER         — SSH user (e.g. boilerrat)
#   VPS_SSH_KEY      — Private SSH key for deploy user
#   GHCR_TOKEN       — GitHub Container Registry token (or use GITHUB_TOKEN)
# ============================================================

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/tips-web

jobs:
  # ----------------------------------------------------------
  # validate — runs on every push and PR
  # ----------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Foundry libs (forge-std, etc.) are git submodules

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  # ----------------------------------------------------------
  # build — runs on main only, after validate passes
  # ----------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      git_sha: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag with Git SHA (primary) and 'latest'
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Pass NEXT_PUBLIC_* vars as build args from secrets
          build-args: |
            NEXT_PUBLIC_PRIVY_APP_ID=${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
            NEXT_PUBLIC_DEFAULT_CHAIN_ID=8453
            NEXT_PUBLIC_REGISTRY_CONTRACT_ADDRESS=${{ secrets.NEXT_PUBLIC_REGISTRY_CONTRACT_ADDRESS }}
            NEXT_PUBLIC_SUBSCRIPTION_MANAGER_ADDRESS=${{ secrets.NEXT_PUBLIC_SUBSCRIPTION_MANAGER_ADDRESS }}
            NEXT_PUBLIC_BASE_RPC_URL=${{ secrets.NEXT_PUBLIC_BASE_RPC_URL }}
            NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL=${{ secrets.NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL }}
            NEXT_PUBLIC_PINATA_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_PINATA_GATEWAY_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_PLAUSIBLE_DOMAIN=${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
          # Layer cache via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # deploy — SSH into VPS, pull new image, restart service
  # ----------------------------------------------------------
  deploy:
    name: Deploy to boilerhaus.org
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/tips-boilerhaus/infra/docker

            # Pull the new image tagged with the current SHA
            GIT_SHA=sha-${{ needs.build.outputs.git_sha }} \
              docker compose pull web

            # Bring up the new container; old one removed after health check passes
            GIT_SHA=sha-${{ needs.build.outputs.git_sha }} \
              docker compose up -d --remove-orphans web

            # Verify the container came up healthy within 60s
            timeout 60 bash -c \
              'until docker compose ps web | grep -q "healthy"; do sleep 3; done'

            echo "Deploy successful: sha-${{ needs.build.outputs.git_sha }}"
