services:
  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 1m
    networks:
      - plausible_internal

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: unless-stopped
    volumes:
      - event-data:/var/lib/clickhouse
      - event-logs:/var/log/clickhouse-server
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      start_period: 1m
    networks:
      - plausible_internal

  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.0
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - plausible-data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      TMPDIR: /var/lib/plausible/tmp
      BASE_URL: ${BASE_URL}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      HTTP_PORT: ${HTTP_PORT:-8000}
      DATABASE_URL: postgres://postgres:postgres@plausible_db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      ENABLE_EMAIL_VERIFICATION: ${ENABLE_EMAIL_VERIFICATION:-false}
      TOTP_VAULT_KEY: ${TOTP_VAULT_KEY:-}
      MAILER_ADAPTER: ${MAILER_ADAPTER:-}
      MAILER_EMAIL: ${MAILER_EMAIL:-}
      MAILER_NAME: ${MAILER_NAME:-}
      SMTP_HOST_ADDR: ${SMTP_HOST_ADDR:-}
      SMTP_HOST_PORT: ${SMTP_HOST_PORT:-}
      SMTP_USER_NAME: ${SMTP_USER_NAME:-}
      SMTP_USER_PWD: ${SMTP_USER_PWD:-}
      SMTP_HOST_SSL_ENABLED: ${SMTP_HOST_SSL_ENABLED:-}
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8000/api/system/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.plausible.rule=Host(`plausible.boilerhaus.org`)
      - traefik.http.routers.plausible.middlewares=security-headers@file
      - traefik.http.routers.plausible.entrypoints=websecure
      - traefik.http.routers.plausible.tls=true
      - traefik.http.routers.plausible.tls.certresolver=letsencrypt
      - traefik.http.services.plausible.loadbalancer.server.port=8000
    networks:
      - plausible_internal
      - dokploy-network

volumes:
  db-data:
  event-data:
  event-logs:
  plausible-data:

networks:
  plausible_internal:
  dokploy-network:
    external: true
